services:
  app:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://goodbattle:goodbattle@postgres:5432/goodbattle
      HOST: 0.0.0.0
      PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: goodbattle
      POSTGRES_USER: goodbattle
      POSTGRES_PASSWORD: goodbattle
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goodbattle -d goodbattle"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
